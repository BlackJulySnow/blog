baseURL = 'https://blog.bsnow.cn'
languageCode = 'zh-CN'
title = 'Liu的博客'
theme = 'PaperMod'

[params]
  author = 'Liu'
  description = '一个程序员的思考与记录'
  keywords = ['博客', '程序员', 'AI', '技术']
  
  # PaperMod 主题设置
  defaultTheme = 'auto'  # 自动切换暗色/亮色
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false

  [params.homeInfoParams]
    Title = "Hi 👋, 我是Liu"
    Content = "这里记录我的技术探索、学习心得和生活思考。从ACM竞赛到AI协作，从代码到文字——这是一个程序员的十年 journey。"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/BlackJulySnow"

  [[params.socialIcons]]
    name = "email"
    url = "mailto:b1ggersnows@gmail.com"

[menu]
  [[menu.main]]
    identifier = 'home'
    name = '🏠 首页'
    url = '/'
    weight = 10

  [[menu.main]]
    identifier = 'posts'
    name = '📝 文章'
    url = '/posts'
    weight = 20

  [[menu.main]]
    identifier = 'tags'
    name = '🏷️ 标签'
    url = '/tags'
    weight = 30

  [[menu.main]]
    identifier = 'skills'
    name = '🛠️ Skills'
    url = '/tags/skill/'
    weight = 35



[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      table = true
      strikethrough = true
      linkify = true

  [markup.highlight]
    style = 'github'
    lineNos = true
    codeFences = true
    guessSyntax = true
    hl_Lines = ''
    lineNoStart = 1
    noClasses = false
    tabWidth = 4

[imaging]
  quality = 85
  resampleFilter = 'lanczos'

[outputs]
  home = ['HTML', 'RSS', 'JSON']
  page = ['HTML']
  section = ['HTML', 'RSS']
